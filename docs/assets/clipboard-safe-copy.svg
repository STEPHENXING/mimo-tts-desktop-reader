<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Safe clipboard copy</title>
  <desc id="desc">The app snapshots the clipboard, copies selected text, then restores the original clipboard.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .card{fill:#fff;stroke:#c4b5fd;stroke-width:2;rx:14}
      .title{font:700 20px Arial, sans-serif;fill:#1e1b4b}
      .text{font:15px Arial, sans-serif;fill:#475569}
      .line{stroke:#7c3aed;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="960" height="300"/>
  <rect class="card" x="44" y="82" width="180" height="136"/>
  <text class="title" x="134" y="126" text-anchor="middle">Snapshot</text>
  <text class="text" x="134" y="158" text-anchor="middle">Save current</text>
  <text class="text" x="134" y="182" text-anchor="middle">clipboard formats</text>
  <path class="line" d="M234 150 H312"/>
  <rect class="card" x="322" y="82" width="180" height="136"/>
  <text class="title" x="412" y="126" text-anchor="middle">Probe</text>
  <text class="text" x="412" y="158" text-anchor="middle">Set marker and</text>
  <text class="text" x="412" y="182" text-anchor="middle">send Ctrl+C</text>
  <path class="line" d="M512 150 H590"/>
  <rect class="card" x="600" y="82" width="180" height="136"/>
  <text class="title" x="690" y="126" text-anchor="middle">Read</text>
  <text class="text" x="690" y="158" text-anchor="middle">Use selected text</text>
  <text class="text" x="690" y="182" text-anchor="middle">inside the app</text>
  <path class="line" d="M790 150 H852"/>
  <rect class="card" x="862" y="82" width="70" height="136"/>
  <text class="title" x="897" y="126" text-anchor="middle">Restore</text>
  <text class="text" x="897" y="158" text-anchor="middle">Put user</text>
  <text class="text" x="897" y="182" text-anchor="middle">data back</text>
</svg>
